<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Ultimate Collection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00ff00;
            --arcade-red: #ff004c;
            --retro-blue: #00d4ff;
        }

        body {
            /* Background bergerak ala Synthwave/Cyberpunk */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ----- MESIN ARCADE ----- */
        .arcade-cabinet {
            background: #1a1a1a;
            padding: 25px;
            border: 10px solid #444;
            border-radius: 30px 30px 5px 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 20px var(--retro-blue);
            width: 90%;
            max-width: 650px;
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ----- SKRIN CRT MODEN ----- */
        .screen {
            background-color: #050505;
            height: 350px;
            border: 15px solid #222;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: inset 0 0 60px rgba(0, 255, 0, 0.1);
        }

        /* Kesan Flicker TV */
        .screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 3;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            50% { opacity: 0.05; }
            100% { opacity: 0.15; }
        }

        /* Garisan Scanline */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            z-index: 4;
            pointer-events: none;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 22px;
            text-shadow: 3px 3px var(--arcade-red), -3px -3px var(--retro-blue);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* ----- MENU ----- */
        ul { list-style: none; padding: 0; }

        li {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
            transition: all 0.2s;
            position: relative;
            padding-left: 40px;
        }

        li.selected {
            color: var(--neon-green);
            transform: scale(1.1);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* Cursor Animated */
        li.selected::before {
            content: "▶";
            position: absolute;
            left: 0;
            color: var(--arcade-red);
            animation: moveSide 0.4s infinite alternate;
        }

        @keyframes moveSide {
            from { left: 0px; }
            to { left: 10px; }
        }

        /* ----- CONTROLLER ----- */
        .control-panel {
            background: #2a2a2a;
            border: 8px solid #444;
            border-top: none;
            width: 90%;
            max-width: 650px;
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: 0 0 30px 30px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .btn-dir, .btn-action {
            font-family: inherit;
            cursor: pointer;
            border: 4px solid #000;
            box-shadow: 0 8px 0 #000;
            transition: 0.1s;
        }

        .btn-dir {
            width: 60px; height: 60px; border-radius: 10px;
            background: #444; color: white;
        }

        .btn-action {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--arcade-red);
            color: #fff; font-size: 14px;
        }

        .btn-dir:active, .btn-action:active {
            box-shadow: 0 0 0 #000;
            transform: translateY(8px);
        }

        .instructions {
            margin-top: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-align: center;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div class="arcade-cabinet">
        <div class="screen">
            <div class="scanlines"></div>
            <h1>SELECT MISSION</h1>
            <ul id="game-list">
                <li data-url="kadetblast.html" class="selected">KADET BLAST</li>
                <li data-url="1941.html">1941 RE-BOOT</li>
                <li data-url="street-ai.html">STREET FIGHTER AI</li>
                <li data-url="upcoming.html">UNKNOWN DATA...</li>
            </ul>
        </div>
    </div>

    <div class="control-panel">
        <div class="joystick">
            <button class="btn-dir" id="btn-up">▲</button>
            <div style="height: 10px;"></div>
            <button class="btn-dir" id="btn-down">▼</button>
        </div>
        <button class="btn-action" id="btn-start">START</button>
    </div>

    <div class="instructions">
        [UP/DOWN] TO NAVIGATE<br>
        [ENTER/START] TO DEPLOY
    </div>

    <script>
        const gameItems = document.querySelectorAll('#game-list li');
        let currentIndex = 0;

        // Sound Effect (Web Audio API)
        function playSound(freq) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = "square";
            osc.frequency.setValueAtTime(freq, context.currentTime);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        function updateSelection() {
            gameItems.forEach((item, index) => {
                item.classList.toggle('selected', index === currentIndex);
            });
            playSound(150); // Bunyi rendah bila tukar menu
        }

        function moveUp() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSelection();
            }
        }

        function moveDown() {
            if (currentIndex < gameItems.length - 1) {
                currentIndex++;
                updateSelection();
            }
        }

        function launchGame() {
            playSound(400); // Bunyi tinggi bila pilih
            const url = gameItems[currentIndex].getAttribute('data-url');
            if(!url) return;

            // Efek Flash
            document.querySelector('.screen').style.backgroundColor = "white";
            setTimeout(() => {
                window.location.href = url;
            }, 200);
        }

        document.getElementById('btn-up').addEventListener('click', moveUp);
        document.getElementById('btn-down').addEventListener('click', moveDown);
        document.getElementById('btn-start').addEventListener('click', launchGame);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') moveUp();
            if (e.key === 'ArrowDown') moveDown();
            if (e.key === 'Enter') launchGame();
        });
    </script>
</body>
</html>
