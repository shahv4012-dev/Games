<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Collection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            user-select: none;
        }

        /* ----- REKAAN MESIN ARCADE ----- */
        .arcade-cabinet {
            background: #111;
            padding: 20px;
            border: 8px solid #555;
            border-radius: 20px 20px 0 0;
            box-shadow: inset 0 0 20px #000, 0 10px 30px rgba(0,0,0,0.8);
            width: 90%;
            max-width: 600px;
        }

        /* ----- SKRIN CRT ----- */
        .screen {
            background-color: #000;
            height: 300px;
            border: 15px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px #000;
        }

        /* Efek scanline (garisan skrin TV lama) */
        .screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        h1 {
            color: #ffcc00;
            text-align: center;
            font-size: 20px;
            text-shadow: 2px 2px #cc0000;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* ----- SENARAI GAME ----- */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 0 20px;
        }

        li {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Gaya bila game dipilih */
        li.selected {
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        /* Cursor '>' yang berkedip */
        li.selected::before {
            content: "> ";
            color: #ff0000;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ----- PANEL KAWALAN (JOYSTICK & BUTANG) ----- */
        .control-panel {
            background: #8b0000; /* Merah gelap */
            border: 8px solid #555;
            border-top: none;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 20px 20px;
            box-sizing: border-box;
        }

        .joystick {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-dir, .btn-action {
            background: #333;
            color: #fff;
            border: 4px solid #111;
            border-radius: 50%;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            box-shadow: 0 5px 0 #111;
            transition: all 0.1s;
        }

        .btn-dir {
            width: 50px;
            height: 50px;
            font-size: 16px;
        }

        .btn-action {
            width: 80px;
            height: 80px;
            font-size: 12px;
            background: #ffcc00; /* Kuning macam butang arcade */
            color: #000;
            box-shadow: 0 6px 0 #b38f00;
        }

        .btn-dir:active, .btn-action:active {
            box-shadow: 0 0 0 #000;
            transform: translateY(5px); /* Efek butang ditekan */
        }

        .instructions {
            margin-top: 20px;
            font-size: 10px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="arcade-cabinet">
        <div class="screen">
            <h1>KOLEKSI KLASIK</h1>
            <ul id="game-list">
                <li data-url="game1.html" class="selected">Kadet Blast</li>
                <li data-url="game2.html">LUMBA KERETA</li>
                <li data-url="1941.html">1941</li>
                <li data-url="game4.html">PENDEKAR PIXEL</li>
            </ul>
        </div>
    </div>

    <div class="control-panel">
        <div class="joystick">
            <button class="btn-dir" id="btn-up">▲</button>
            <button class="btn-dir" id="btn-down">▼</button>
        </div>
        <div class="action-buttons">
            <button class="btn-action" id="btn-start">START</button>
        </div>
    </div>

    <div class="instructions">
        GUNAKAN ARROW KEYS DI KEYBOARD ATAU TEKAN BUTANG DI SKRIN<br><br>
        [ENTER] UNTUK MULA
    </div>

    <script>
        // JavaScript untuk mengawal pergerakan menu
        const gameItems = document.querySelectorAll('#game-list li');
        let currentIndex = 0; // Game pertama sentiasa index 0

        // Fungsi untuk kemaskini paparan cursor
        function updateSelection() {
            gameItems.forEach((item, index) => {
                if (index === currentIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        // Fungsi gerak atas
        function moveUp() {
            if (currentIndex > 0) {
                currentIndex--;
                updateSelection();
            }
        }

        // Fungsi gerak bawah
        function moveDown() {
            if (currentIndex < gameItems.length - 1) {
                currentIndex++;
                updateSelection();
            }
        }

        // Fungsi buka game
        function launchGame() {
            const selectedGame = gameItems[currentIndex];
            const gameUrl = selectedGame.getAttribute('data-url');
            // Menambah animasi skrin berkelip sebelum tukar page (pilihan)
            document.body.style.backgroundColor = "white";
            setTimeout(() => {
                window.location.href = gameUrl;
            }, 100);
        }

        // --- KAWALAN MENGGUNAKAN BUTANG DI SKRIN ---
        document.getElementById('btn-up').addEventListener('click', moveUp);
        document.getElementById('btn-down').addEventListener('click', moveDown);
        document.getElementById('btn-start').addEventListener('click', launchGame);

        // --- KAWALAN MENGGUNAKAN KEYBOARD ---
        window.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') {
                moveUp();
            } else if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') {
                moveDown();
            } else if (event.key === 'Enter' || event.key === ' ') {
                launchGame();
            }
        });
    </script>

</body>
</html>
